map $http_x_forwarded_proto $client_forwarded_proto {
    default $scheme;
    http http;
    https https;
}

map $http_x_real_ip $client_real_ip {
    default $http_x_real_ip;
    "" $remote_addr;
}

map $http_x_forwarded_for $client_forwarded_for {
    default $http_x_forwarded_for;
    "" $client_real_ip;
}

server {
    # Apache is the public entry point; keep the application proxy host-local.
    listen 127.0.0.1:8030;
    server_name _;

    # Apache runs on the same host and is the only trusted forwarding proxy.
    # Direct clients cannot spoof X-Forwarded-For because their socket address
    # will not match either trusted loopback address.
    set_real_ip_from 127.0.0.1;
    set_real_ip_from ::1;
    real_ip_header X-Forwarded-For;
    real_ip_recursive on;

    root /usr/share/nginx/html;
    index index.html;

    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;

    etag on;
    if_modified_since exact;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types
        application/javascript
        application/json
        application/manifest+json
        application/xml
        image/svg+xml
        text/css
        text/javascript
        text/plain;

    # Vite fingerprints production assets, so they are safe to cache permanently.
    location ^~ /assets/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        access_log off;
    }

    # Public files keep stable names, so cache them but allow new deployments to replace them.
    location ~* \.(?:avif|gif|ico|jpe?g|png|svg|webp|woff2?|ttf|otf)$ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=2592000" always;
        access_log off;
    }

    # The install metadata may change independently from its icon files.
    location = /site.webmanifest {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=86400" always;
        access_log off;
    }

    # Browsers must revalidate the worker on every update check so deploys activate promptly.
    location = /sw.js {
        try_files $uri =404;
        add_header Cache-Control "no-cache, must-revalidate" always;
        add_header Service-Worker-Allowed "/" always;
        access_log off;
    }

    # Always revalidate the entry point so new deployments are discovered immediately.
    location = /index.html {
        try_files $uri =404;
        add_header Cache-Control "no-cache, must-revalidate" always;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ^~ /api/ {
        # Since the nginx container is on the host network,
        # point directly to the fastify server on localhost
        set $upstream http://127.0.0.1:3001;
        proxy_pass $upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $client_real_ip;
        # Prefer Apache's forwarded client header, then X-Real-IP, then the
        # direct peer address accepted by nginx.
        proxy_set_header X-Forwarded-For $client_forwarded_for;
        proxy_set_header X-Forwarded-Proto $client_forwarded_proto;
        proxy_set_header X-Client-IP "";
    }
}
